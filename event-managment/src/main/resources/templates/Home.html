<!-- ========================= -->
<!-- MAIN PAGE (index.html)   -->
<!-- ========================= -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ana Sayfa</title>

  <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg,#eef2f7,#dfe9f3);
        min-height:100vh;
        padding:40px 20px;
        color:#222;
    }

    .container{
        max-width:900px;
        margin:auto;
    }

    .top-bar{
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:30px;
    }

    h1{
        font-size:34px;
        font-weight:700;
    }

    .ekle-btn{
        background:linear-gradient(135deg,#4f46e5,#7c3aed);
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:12px;
        cursor:pointer;
        font-weight:600;
        transition:.2s;
    }

    .ekle-btn:hover{
        transform:translateY(-2px);
        box-shadow:0 8px 20px rgba(0,0,0,.15);
    }

    .list{
        display:flex;
        flex-direction:column;
        gap:16px;
    }

    .duyuru-item{
        background:white;
        border-radius:18px;
        overflow:hidden;
        display:flex;
        align-items:center;
        gap:18px;
        padding:14px;
        box-shadow:0 10px 25px rgba(0,0,0,.08);
        transition:.2s;
    }

    .duyuru-item:hover{
        transform:translateY(-3px);
    }

    .thumb{
        width:90px;
        height:90px;
        border-radius:14px;
        object-fit:cover;
        background:#ddd;
        flex-shrink:0;
    }

    .info{
        flex:1;
    }

    .title{
        font-size:20px;
        font-weight:700;
        margin-bottom:6px;
    }

    .desc{
        color:#666;
        font-size:14px;
    }

    .arrow{
        text-decoration:none;
        font-size:26px;
        color:#555;
        margin-right:8px;
    }

    .sil-btn{
        background:#ef4444;
        color:white;
        border:none;
        padding:10px 14px;
        border-radius:10px;
        cursor:pointer;
        font-weight:600;
    }

    .filtreler{
        margin-top:30px;
        display:flex;
        flex-wrap:wrap;
        gap:12px;
    }

    .filtreler a,
    select{
        padding:10px 16px;
        border:none;
        border-radius:30px;
        background:white;
        text-decoration:none;
        color:#333;
        box-shadow:0 5px 14px rgba(0,0,0,.08);
    }

    .filtreler a:hover{
        background:#4f46e5;
        color:white;
    }

    .modal-overlay{
        display:none;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.45);
        padding:40px 20px;
    }

    .modal{
        max-width:500px;
        margin:auto;
        background:white;
        border-radius:20px;
        padding:28px;
        box-shadow:0 20px 50px rgba(0,0,0,.2);
    }

    .modal h3{
        margin-bottom:18px;
    }

    .modal input{
        width:100%;
        padding:12px;
        border:1px solid #ddd;
        border-radius:12px;
        margin-bottom:12px;
    }

    .modal button{
        padding:12px 16px;
        border:none;
        border-radius:12px;
        cursor:pointer;
        font-weight:600;
    }

    .save-btn{
        background:#4f46e5;
        color:white;
    }

    .cancel-btn{
        background:#ddd;
        margin-left:8px;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="top-bar">
    <h1>Etkinlikler</h1>
    <button class="ekle-btn"
            onclick="document.getElementById('modal').style.display='block'">
      + Yeni Etkinlik
    </button>
  </div>

  <!-- LIST -->
  <div class="list">

    <div th:each="d : ${duyurular}" class="duyuru-item">

      <img th:if="${d.thumnailLink != null}"
           th:src="${d.thumnailLink}"
           class="thumb">

      <div th:unless="${d.thumnailLink != null}" class="thumb"></div>

      <div class="info">
        <div class="title" th:text="${d.etkinlikIsmi}"></div>
        <div class="desc" th:text="${d.etkinlikAciklamasi}"></div>
      </div>

      <a class="arrow"
         th:href="@{/duyuru/{id}(id=${d.id})}">
        →
      </a>

      <form th:action="@{/delete/{id}(id=${d.id})}" method="post">
        <button class="sil-btn">Sil</button>
      </form>

    </div>
  </div>

  <!-- FILTERS -->
  <div class="filtreler">
    <a th:href="@{/?filtre={v}(v=${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).Bugun.value})}">
      Bugün
    </a>

    <a th:href="@{/?filtre={v}(v=${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).Yarin.value})}">
      Yarın
    </a>

    <a th:href="@{/?filtre={v}(v=${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BuHafta.value})}">
      Bu Hafta
    </a>

    <select onchange="window.location.href='/?filtre='+this.value">
      <option value="">Diğer Filtreler</option>
      <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BuAy.value}">Bu Ay</option>
      <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).UcAy.value}">3 Ay</option>
      <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BuYil.value}">Bu Yıl</option>
      <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BirYildanFazla.value}">Bir yıldan uzak</option>
      <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).TarihiGecmis.value}">Geçmiş etkinlikler</option>
      <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).TarihiBelirsiz.value}">Tarihi belirsiz etkinlikler</option>
    </select>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal"
     onclick="if(event.target===this)this.style.display='none'">

  <div class="modal">
    <h3>Yeni Etkinlik</h3>

    <form th:action="@{/add}" method="post">

      <input type="text" name="etkinlikIsmi" placeholder="Etkinlik Adı" required>
      <input type="text" name="etkinlikAciklamasi" placeholder="Açıklama">
      <input type="datetime-local" name="etkinlikTarihi">
      <input type="text" name="ekstra" placeholder="Ekstra Bilgi">
      <input type="text" name="thumnailLink" placeholder="Görsel URL">

      <button type="submit" class="save-btn">Kaydet</button>
      <button type="button" class="cancel-btn"
              onclick="document.getElementById('modal').style.display='none'">
        İptal
      </button>

    </form>
  </div>
</div>

</body>
</html>
