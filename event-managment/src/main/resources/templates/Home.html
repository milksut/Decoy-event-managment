<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Ana Sayfa</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .duyuru-item { border: 1px solid #ccc; padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
    .duyuru-item a { text-decoration: none; color: #333; font-weight: bold; }
    .arrow { color: #666; }
    .filtreler { display: flex; gap: 12px; margin-top: 30px; flex-wrap: wrap; align-items: center; }
    .filtreler a { border: 2px solid #333; border-radius: 50px; padding: 10px 18px; text-decoration: none; color: #333; font-size: 14px; }
    .filtreler a.aktif { background: #333; color: white; }
    select { border: 2px solid #333; border-radius: 50px; padding: 10px 18px; font-size: 14px; }
    .sil-btn { padding: 4px 10px; background: red; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .ekle-btn { padding: 8px 16px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 20px; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10; }
    .modal { background: white; padding: 24px; border-radius: 8px; width: 400px; margin: 100px auto; }
    .modal input { display: block; width: 100%; margin-bottom: 8px; padding: 8px; box-sizing: border-box; }
    .modal button { padding: 8px 16px; background: #333; color: white; border: none; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
<h1>Ana Sayfa</h1>

<button class="ekle-btn" onclick="document.getElementById('modal').style.display='block'">+ Etkinlik Ekle</button>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h3>Yeni Etkinlik Ekle</h3>
    <form th:action="@{/add}" method="post">
      <input type="text" name="etkinlikIsmi" placeholder="Etkinlik Adı *" required/>
      <input type="text" name="etkinlikAciklamasi" placeholder="Açıklama"/>
      <label>Etkinlik Tarihi ve Saati</label>
      <input type="datetime-local" name="etkinlikTarihi"/>
      <input type="text" name="ekstra" placeholder="Ekstra Bilgi"/>
      <input type="text" name="thumnailLink" placeholder="Görsel URL"/>
      <button type="submit">Ekle</button>
      <button type="button" onclick="document.getElementById('modal').style.display='none'" style="background:#999;margin-left:8px;">İptal</button>
    </form>
  </div>
</div>

<div th:each="d : ${duyurular}" class="duyuru-item">
  <div th:if="${d.thumnailLink != null}">
    <img th:src="${d.thumnailLink}" alt="Görsel" style="width:50px;"/>
  </div>
  <span th:text="${d.etkinlikIsmi} + ': ' + ${d.etkinlikAciklamasi}">Duyuru</span>
  <a th:href="@{/duyuru/{id}(id=${d.id})}" class="arrow">--&gt;</a>
  <form th:action="@{/delete/{id}(id=${d.id})}" method="post">
    <button type="submit" class="sil-btn">Sil</button>
  </form>
</div>

<div class="filtreler">
  <a th:href="@{/?filtre={v}(v=${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).Bugun.value})}">Bugün</a>
  <a th:href="@{/?filtre={v}(v=${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).Yarin.value})}">Yarın</a>
  <a th:href="@{/?filtre={v}(v=${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BuHafta.value})}">Bu Hafta</a>
  <select onchange="window.location.href='/?filtre='+this.value">
    <option value="">Diğer zaman aralıkları</option>
    <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BuAy.value}">Bu Ay</option>
    <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).UcAy.value}">3 Ay</option>
    <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BuYil.value}">Bu Yıl</option>
    <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).BirYildanFazla.value}">1 Yıldan Fazla</option>
    <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).TarihiGecmis.value}">Tarihi Geçmiş</option>
    <option th:value="${T(com.Decoy.event_managment.Models.DuyuruDurumEnum).TarihiBelirsiz.value}">Tarihi Belirsiz</option>
  </select>
</div>
</body>
</html>
