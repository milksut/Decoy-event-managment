<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${duyuru.baslik}">Duyuru Detayı</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    .header-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .placeholder-img { width: 100%; height: 200px; background: linear-gradient(#87CEEB, #90EE90); border-radius: 8px; }
    h2 { margin-top: 24px; }
    a { color: #333; }
  </style>
</head>
<body>
<a href="/">← Geri</a>

<!-- Header image -->
<div th:if="${duyuru.resimUrl != null}">
  <img class="header-img" th:src="${duyuru.resimUrl}" alt="Duyuru görseli"/>
</div>
<div th:unless="${duyuru.resimUrl != null}" class="placeholder-img"></div>

<h2 th:text="${duyuru.baslik}">Duyuru Başlığı</h2>
<p th:text="${duyuru.aciklama}">Duyuru açıklaması buraya gelecek.</p>
</body>
</html>
