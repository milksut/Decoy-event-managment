<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${duyuru.etkinlikIsmi}"></title>

  <style>
    body{
        font-family:"Segoe UI",Arial;
        background:linear-gradient(135deg,#eef2f7,#dfe9f3);
        padding:40px 20px;
    }

    .card{
        max-width:850px;
        margin:auto;
        background:white;
        border-radius:24px;
        overflow:hidden;
        box-shadow:0 20px 50px rgba(0,0,0,.08);
    }

    .header-img{
        width:100%;
        height:320px;
        object-fit:cover;
    }

    .placeholder{
        height:320px;
        background:linear-gradient(135deg,#93c5fd,#c4b5fd);
    }

    .content{
        padding:30px;
    }

    h1{
        margin-bottom:12px;
    }

    .desc{
        font-size:18px;
        color:#555;
        line-height:1.6;
        margin-bottom:20px;
    }

    .extra{
        background:#f3f4f6;
        padding:14px;
        border-radius:12px;
        margin-top:14px;
    }

    .back{
        display:inline-block;
        margin-bottom:20px;
        text-decoration:none;
        color:#4f46e5;
        font-weight:600;
    }
  </style>
</head>

<body>

<div style="max-width:850px;margin:auto;">
  <a href="/" class="back">← Ana Sayfa</a>
</div>

<div class="card">

  <img th:if="${duyuru.thumnailLink != null}"
       th:src="${duyuru.thumnailLink}"
       class="header-img">

  <div th:unless="${duyuru.thumnailLink != null}" class="placeholder"></div>

  <div class="content">

    <h1 th:text="${duyuru.etkinlikIsmi}"></h1>

    <p class="desc"
       th:text="${duyuru.etkinlikAciklamasi}">
    </p>

    <div class="extra" th:if="${duyuru.etkinlikTarihi != null}">
      📅 <span th:text="${duyuru.etkinlikTarihi}"></span>
    </div>

    <div class="extra" th:if="${duyuru.ekstra != null}">
      ℹ️ <span th:text="${duyuru.ekstra}"></span>
    </div>

  </div>
</div>

</body>
</html>
